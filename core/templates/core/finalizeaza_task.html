<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizare Task</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/c15115Nm/taskmanager-icon-1.png">
<link rel="apple-touch-icon" href="https://i.postimg.cc/c15115Nm/taskmanager-icon-1.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1d20">

<meta name="apple-mobile-web-app-title" content="Task Manager">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 border-top border-success border-4">
                    <div class="card-body p-4">
                        <h3 class="card-title text-success mb-3">✔ Finalizare Task</h3>
                        <h5 class="text-dark">{{ task.titlu }}</h5>
                        <p class="text-muted small">Locație: {{ task.locatie }}</p>
                        
                        <hr>
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="raport_finalizare" class="form-label fw-bold text-secondary">
                                    Raport de finalizare / Observații:
                                </label>
                                <textarea class="form-control bg-white border-secondary" id="raport_finalizare" name="raport_finalizare" rows="5" placeholder="Scrie aici ce acțiuni ai întreprins, ce materiale ai folosit, probleme întâmpinate etc..." required></textarea>
                                <small class="text-muted mt-2 d-block">Acest mesaj va fi trimis direct către managerul care a creat task-ul, iar task-ul va fi închis.</small>
                            </div>
                            
                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'lista_taskuri' %}" class="btn btn-outline-secondary">← Înapoi la listă</a>
                                <button type="submit" class="btn btn-success px-5 fw-bold">Trimite și Închide Task</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
